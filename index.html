<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: #FFFFFF;
            scrollbar-width: thin;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: linear-gradient(to right, #434343, #000000);
            text-align: center;
            color: #f3f3f3;
        }

        header h1 {
            font-size: 4rem;
            margin: 0;
        }

        nav {
            display: flex;
            justify-content: center;
            margin: 20px;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        nav a:hover {
            background-color: #333;
        }

        .skills {
            padding: 50px;
            text-align: center;
        }

        .skills h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .skill-item {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .skill-item:hover {
            transform: translateY(-5px);
        }

        .skill-item p {
            margin: 0;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>John Doe</h1>
            <nav>
                <a href="#about">About</a>
                <a href="#projects">Projects</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>
    
    <section class="skills" id="skills">
        <h2>Skills</h2>
        <div class="skills-grid">
            <div class="skill-item">
                <p>HTML</p>
            </div>
            <div class="skill-item">
                <p>CSS</p>
            </div>
            <div class="skill-item">
                <p>JavaScript</p>
            </div>
            <div class="skill-item">
                <p>React</p>
            </div>
            <div class="skill-item">
                <p>Node.js</p>
            </div>
            <div class="skill-item">
                <p>Python</p>
            </div>
        </div>
    </section>
</body>
</html>
