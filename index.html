<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #31314a 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .dashboard {
            width: 90%;
            max-width: 1200px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            padding: 2rem;
        }
        .temperature-display {
            font-size: 5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }
        .forecast {
            display: flex;
            justify-content: space-between;
        }
        .day {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            flex: 1;
            margin: 0 5px;
            text-align: center;
        }
        .day h3 {
            margin: 10px 0;
            font-size: 1.2rem;
        }
        .day p {
            font-size: 1rem;
        }
        .day img {
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="temperature-display">72°F</div>
        <div class="forecast">
            <div class="day">
                <h3>Monday</h3>
                <img src="https://img.icons8.com/emoji/48/000000/sun-emoji.png" alt="Sunny">
                <p>75°F</p>
            </div>
            <div class="day">
                <h3>Tuesday</h3>
                <img src="https://img.icons8.com/emoji/48/000000/cloud-emoji.png" alt="Cloudy">
                <p>68°F</p>
            </div>
            <div class="day">
                <h3>Wednesday</h3>
                <img src="https://img.icons8.com/emoji/48/000000/cloud-with-rain-emoji.png" alt="Rainy">
                <p>62°F</p>
            </div>
            <div class="day">
                <h3>Thursday</h3>
                <img src="https://img.icons8.com/emoji/48/000000/thunder-cloud-emoji.png" alt="Stormy">
                <p>66°F</p>
            </div>
            <div class="day">
                <h3>Friday</h3>
                <img src="https://img.icons8.com/emoji/48/000000/sun-emoji.png" alt="Sunny">
                <p>77°F</p>
            </div>
            <div class="day">
                <h3>Saturday</h3>
                <img src="https://img.icons8.com/emoji/48/000000/cloud-emoji.png" alt="Cloudy">
                <p>70°F</p>
            </div>
            <div class="day">
                <h3>Sunday</h3>
                <img src="https://img.icons8.com/emoji/48/000000/cloud-with-rain-emoji.png" alt="Rainy">
                <p>68°F</p>
            </div>
        </div>
    </div>
</body>
</html>
